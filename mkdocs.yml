site_name: ParaPulse ModelSpec
site_description: >-
  Extract and normalize LLM model specifications from heterogeneous sources
  into one unified, type-safe schema.
site_author: ParaPulse
repo_url: https://github.com/parapulseio/modelspec
repo_name: parapulseio/modelspec
docs_dir: docs
copyright: Copyright &copy; ParaPulse — Apache-2.0

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Concepts:
      - Overview: overview.md
      - Architecture: architecture.md
  - Schema:
      - Schema Design: schema.md
      - Schema Review: schema-review.md
  - Extraction:
      - Extractors: extractors.md
      - Pipeline: pipeline.md
      - Quantization & Merge: quantization-and-merge.md
  - Usage:
      - CLI: cli.md
      - Consumer Helpers: helpers.md
      - Analytics: analytics.md
  - Project:
      - Development: development.md
      - Roadmap: roadmap.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
